<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#00C07F"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C07F"/>
      <stop offset="100%" style="stop-color:#009964"/>
    </linearGradient>
  </defs>
  <!-- Chữ CW -->
  <text x="256" y="200" font-family="Arial Black,sans-serif" font-size="130" font-weight="900" fill="white" text-anchor="middle">CW</text>
  <!-- Dòng kẻ -->
  <rect x="100" y="220" width="312" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
  <!-- Chữ nhỏ -->
  <text x="256" y="310" font-family="Arial,sans-serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">CLEAN</text>
  <text x="256" y="375" font-family="Arial,sans-serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">WORLD</text>
  <!-- Sparkle -->
  <text x="256" y="440" font-size="55" text-anchor="middle">✨</text>
</svg>